<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Management System - Secure Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    
    <style>
        /* --- DESIGN SYSTEM MATCHING DASHBOARD --- */
        :root {
            --bg-main: #0b0f19;
            --bg-surface: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-primary: #0ea5e9; 
            --accent-danger: #f43f5e;  
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-main); 
            background-image: radial-gradient(circle at top right, rgba(14, 165, 233, 0.08), transparent 500px),
                              radial-gradient(circle at bottom left, rgba(14, 165, 233, 0.05), transparent 400px);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        /* Glass Card Effect */
        .glass-card { 
            background: var(--bg-surface); 
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color); 
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            padding: 45px 40px;
            position: relative;
        }

        /* Top Blue Accent Line */
        .glass-card::before { 
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; 
            background: linear-gradient(90deg, var(--accent-primary), #3b82f6); 
        }

        .brand-icon {
            width: 65px; height: 65px;
            background: rgba(14, 165, 233, 0.1);
            border: 1px solid rgba(14, 165, 233, 0.2);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px auto;
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.15);
        }

        /* Premium Inputs */
        .input-modern { 
            padding: 14px 18px; background: rgba(0,0,0,0.4); color: white; 
            border: 1px solid var(--border-color); border-radius: 12px; 
            font-family: 'Inter', sans-serif; font-size: 0.95rem;
            outline: none; transition: all 0.3s ease; width: 100%;
        }
        .input-modern::placeholder { color: #64748b; }
        .input-modern:focus { 
            border-color: var(--accent-primary); 
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.15); 
            background: rgba(0,0,0,0.6);
        }

        /* Login Button */
        .btn-login {
            background: var(--accent-primary);
            color: #fff; border: none; padding: 14px; border-radius: 12px;
            font-weight: 600; font-size: 1rem; width: 100%; letter-spacing: 0.5px;
            transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin-top: 25px;
            cursor: pointer;
        }
        .btn-login:hover {
            background: #0284c7; box-shadow: 0 8px 25px rgba(14, 165, 233, 0.4);
            transform: translateY(-2px);
        }

        /* Error Message Animation */
        .error-box {
            background: rgba(244, 63, 94, 0.1); border: 1px solid rgba(244, 63, 94, 0.3);
            color: var(--accent-danger); padding: 12px; border-radius: 10px;
            font-size: 0.85rem; font-weight: 500; margin-top: 20px; text-align: center;
            display: none; align-items: center; justify-content: center; gap: 8px;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            50% { transform: translateX(6px); }
            75% { transform: translateX(-6px); }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="brand-icon">
            <span class="material-icons-round text-info" style="font-size: 34px;">admin_panel_settings</span>
        </div>
        
        <div class="text-center mb-4">
            <h4 class="text-white fw-bold mb-1">System Access</h4>
            <p class="text-secondary small mb-0">SmartCity TMS Core Authorization</p>
        </div>
        
        <div>
            <div class="mb-3">
                <input type="text" id="username" class="input-modern" placeholder="Officer ID (e.g., admin)" required autocomplete="off">
            </div>
            <div class="mb-2">
                <input type="password" id="password" class="input-modern" placeholder="Passcode" required onkeypress="handleEnter(event)">
            </div>
            
            <button type="button" class="btn-login" onclick="checkLogin()">
                INITIALIZE SECURE LINK <span class="material-icons-round fs-5">arrow_forward</span>
            </button>
        </div>

        <div class="error-box" id="error-box">
            <span class="material-icons-round" style="font-size: 1.2rem;">error_outline</span>
            <span id="error-text">Access Denied: Invalid Credentials</span>
        </div> 
        
        <div class="text-center mt-4">
            <small class="text-secondary" style="font-size: 0.7rem; letter-spacing: 1px; opacity: 0.6;">
                <span class="material-icons-round" style="font-size: 0.8rem; vertical-align: middle;">lock</span> 
                AES-256 ENCRYPTED CONNECTION
            </small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Enter dabane par bhi login ho jaye
        function handleEnter(e) {
            if (e.key === 'Enter') {
                checkLogin();
            }
        }

        // JS Login Logic
        function checkLogin() {
            var user = document.getElementById("username").value.trim();
            var pass = document.getElementById("password").value.trim();
            var errorBox = document.getElementById("error-box");

            // Hardcoded Authentication for Vercel
            if (user === "admin" && pass === "admin123") {
                // Login Pass! Session save karo aur dashboard pe bhejo
                sessionStorage.setItem("isLoggedIn", "true");
                window.location.href = "dashboard.html";
            } else {
                // Login Fail! Error box dikhao
                errorBox.style.display = "flex";
                // Animation dobara chalane ke liye hack
                errorBox.style.animation = 'none';
                errorBox.offsetHeight; /* trigger reflow */
                errorBox.style.animation = null; 
            }
        }
    </script>
</body>
</html>
